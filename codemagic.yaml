workflows:
  ios-release:
    name: iOS Release Safebrok
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: "Codemagic Safebrok"

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.safebrok

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>HSQ6HX3U27</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.safebrok</key>
              <string>Safebrok ios_app_store 1783073252</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        script: |
          flutter build ipa --release -t lib/main.dart --export-options-plist=/Users/builder/export_options.plist
          echo "BUSCANDO IPA..."
          find build -name "*.ipa" -print

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration