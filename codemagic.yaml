workflows:
  ios-release:
    name: iOS Release Safebrok
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.safebrok

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.safebrok \
            --type IOS_APP_STORE \
            --create

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: flutter build ipa --release -t lib/main.dart

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true