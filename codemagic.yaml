workflows:
  ios-release:
    name: iOS Release Safebrok
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic Safebrok

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.safebrok.andalucia

    scripts:
      - name: Fetch signing files
        script: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Add signing certificate to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build IPA
        script: flutter build ipa --release -t lib/main.dart --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true